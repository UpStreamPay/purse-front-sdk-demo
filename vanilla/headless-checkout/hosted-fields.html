<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hosted Fields — Quick Start</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="max-w-2xl mx-auto px-5 pt-10 pb-20">
      <div class="mb-8">
        <a href="../" class="inline-flex items-center gap-1.5 text-muted no-underline text-sm mb-4 hover:text-text">← All examples</a>
        <div>
          <span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-semibold tracking-wide uppercase bg-violet-100 text-violet-800">Headless</span>
          <h1 class="text-2xl font-bold mt-2 mb-1.5">Hosted Fields — Isolated Fields</h1>
          <p class="text-muted text-sm">
            Individual iframes per field via <code>method.getHostedFields()</code>.
            Switch layouts below — the same iframes reflow via CSS.
          </p>
        </div>
      </div>

      <div class="flex mb-7 bg-white border border-border rounded-xl overflow-hidden sm:flex-row flex-col">
        <div class="step flex-1 px-3.5 py-3 text-xs text-muted border-r border-border flex items-center gap-2 last:border-r-0 sm:border-b-0 border-b" id="step-sdk"    data-state="pending"><div class="step__icon w-5 h-5 rounded-full bg-step-pending flex items-center justify-center shrink-0 text-xs text-white transition-colors duration-200">1</div><span class="step__label text-xs">Load SDK</span></div>
        <div class="step flex-1 px-3.5 py-3 text-xs text-muted border-r border-border flex items-center gap-2 last:border-r-0 sm:border-b-0 border-b" id="step-init"   data-state="pending"><div class="step__icon w-5 h-5 rounded-full bg-step-pending flex items-center justify-center shrink-0 text-xs text-white transition-colors duration-200">2</div><span class="step__label text-xs">Init checkout</span></div>
        <div class="step flex-1 px-3.5 py-3 text-xs text-muted border-r border-border flex items-center gap-2 last:border-r-0 sm:border-b-0 border-b" id="step-method" data-state="pending"><div class="step__icon w-5 h-5 rounded-full bg-step-pending flex items-center justify-center shrink-0 text-xs text-white transition-colors duration-200">3</div><span class="step__label text-xs">Get method</span></div>
        <div class="step flex-1 px-3.5 py-3 text-xs text-muted border-r border-border flex items-center gap-2 last:border-r-0 sm:border-b-0 border-b" id="step-render" data-state="pending"><div class="step__icon w-5 h-5 rounded-full bg-step-pending flex items-center justify-center shrink-0 text-xs text-white transition-colors duration-200">4</div><span class="step__label text-xs">Render fields</span></div>
        <div class="step flex-1 px-3.5 py-3 text-xs text-muted border-r border-border flex items-center gap-2 last:border-r-0" id="step-pay"    data-state="pending"><div class="step__icon w-5 h-5 rounded-full bg-step-pending flex items-center justify-center shrink-0 text-xs text-white transition-colors duration-200">5</div><span class="step__label text-xs">Pay</span></div>
      </div>

      <div id="setup-notice" class="flex gap-3 px-4 py-3.5 bg-yellow-50 border border-yellow-300 rounded-lg text-sm text-yellow-900 mb-6" style="display:none">
        <span>⚠</span><span id="setup-notice-msg"></span>
      </div>

      <!-- Layout switcher -->
      <div class="flex gap-1.5 mb-4">
        <button class="layout-tab px-3.5 py-1.5 border border-border rounded-full text-xs font-[inherit] bg-bg cursor-pointer transition-all" data-layout="grid">Grid</button>
        <button class="layout-tab px-3.5 py-1.5 border border-border rounded-full text-xs font-[inherit] bg-bg cursor-pointer transition-all" data-layout="single-line">Single line</button>
        <button class="layout-tab px-3.5 py-1.5 border border-border rounded-full text-xs font-[inherit] bg-bg cursor-pointer transition-all" data-layout="card">Card</button>
      </div>

      <!-- ── Grid layout ─────────────────────────────────────── -->
      <div id="layout-grid" class="bg-white border border-border rounded-xl p-5 mb-4" style="display:none">
        <div class="text-sm font-semibold text-muted uppercase tracking-wider mb-3.5">Card details</div>
        <div class="hf-layout-grid">
          <div class="hf-field hf-field--full hf-field--pan">
            <label class="hf-label">Card number</label>
            <div class="hf-field-wrap" id="grid-pan"></div>
          </div>
          <div class="hf-field hf-field--exp">
            <label class="hf-label">Expiry</label>
            <div class="hf-field-wrap" id="grid-exp"></div>
          </div>
          <div class="hf-field hf-field--cvv">
            <label class="hf-label">CVV</label>
            <div class="hf-field-wrap" id="grid-cvv"></div>
          </div>
          <div class="hf-field hf-field--name">
            <label class="hf-label">Holder name</label>
            <div class="hf-field-wrap" id="grid-name"></div>
          </div>
        </div>
      </div>

      <!-- ── Single-line layout ──────────────────────────────── -->
      <div id="layout-single-line" class="bg-white border border-border rounded-xl p-5 mb-4" style="display:none">
        <div class="text-sm font-semibold text-muted uppercase tracking-wider mb-3.5">Card details</div>
        <div class="hf-layout-single-line">
          <div class="hf-field hf-field--pan">
            <label class="hf-label">Card number</label>
            <div class="hf-field-wrap" id="sl-pan"></div>
          </div>
          <div class="hf-field hf-field--name">
            <label class="hf-label">Holder name</label>
            <div class="hf-field-wrap" id="sl-name"></div>
          </div>
          <div class="hf-field hf-field--exp">
            <label class="hf-label">Expiry</label>
            <div class="hf-field-wrap" id="sl-exp"></div>
          </div>
          <div class="hf-field hf-field--cvv">
            <label class="hf-label">CVV</label>
            <div class="hf-field-wrap" id="sl-cvv"></div>
          </div>
        </div>
      </div>

      <!-- ── Card-shaped layout ──────────────────────────────── -->
      <div id="layout-card" class="bg-white border border-border rounded-xl p-5 mb-4" style="display:none">
        <div class="hf-layout-card">
          <div class="hf-card-header">
            <div class="hf-card-chip"></div>
            <!-- Contactless symbol -->
            <svg viewBox="0 0 30 30" width="28" height="28" fill="none" class="hf-card-contactless">
              <circle cx="5.5" cy="15" r="2" fill="white"/>
              <path d="M10 10.5a6.5 6.5 0 0 1 0 9" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M14.5 7a11 11 0 0 1 0 16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M19 3.5a15.5 15.5 0 0 1 0 23" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="hf-field hf-field--pan">
            <label class="hf-label">Card number</label>
            <div class="hf-field-wrap" id="card-pan"></div>
          </div>
          <div class="hf-field hf-field--exp">
            <label class="hf-label">Expiry</label>
            <div class="hf-field-wrap" id="card-exp"></div>
          </div>
          <div class="hf-field hf-field--cvv">
            <label class="hf-label">CVV</label>
            <div class="hf-field-wrap" id="card-cvv"></div>
          </div>
          <div class="hf-field hf-field--name">
            <label class="hf-label">Holder name</label>
            <div class="hf-field-wrap" id="card-name"></div>
          </div>
        </div>
      </div>

      <!-- Brand detection indicator (shared across all layouts) -->
      <div class="flex items-center gap-2 text-xs text-muted mt-2.5" id="brand-indicator" style="display:none">
        <span>Detected:</span>
        <div id="brand-pills"></div>
      </div>

      <button class="flex items-center justify-center gap-2 w-full py-3.5 bg-accent text-white border-0 rounded-lg text-base font-semibold cursor-pointer transition-all mt-4 hover:bg-accent-hover disabled:opacity-50 disabled:cursor-not-allowed" id="pay-btn" disabled>Pay</button>

      <div id="result"></div>
    </div>
    <script type="module" src="/src/headless-checkout/hosted-fields.ts"></script>
  </body>
</html>
