name: Publish SDK Demos

on:
  push:
    tags:
      - '@upstreampay/purse-sdk-demos@[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@upstreampay'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#@upstreampay/purse-sdk-demos@}" >> $GITHUB_OUTPUT

      - name: Set package version
        working-directory: sandpack
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      - name: Install dependencies
        working-directory: sandpack
        run: npm install

      - name: Build
        working-directory: sandpack
        run: npm run build
        env:
          VITE_PURSE_SESSION_URL: https://usp-widget-merchant.purse-sandbox.com/orchestration_session/
          VITE_PURSE_ORDER_URL: https://usp-widget-merchant.purse-sandbox.com/orchestration_order/

      - name: Publish
        working-directory: sandpack
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
