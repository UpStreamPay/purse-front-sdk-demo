name: Tag and Publish Demos

on:
  push:
    branches:
      - main
    paths:
      - 'sandpack/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(jq -r '.version' sandpack/package.json)
          NAME=$(jq -r '.name' sandpack/package.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$NAME@$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.pkg.outputs.TAG }}" | grep -q "${{ steps.pkg.outputs.TAG }}"; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          git tag ${{ steps.pkg.outputs.TAG }}
          git push origin ${{ steps.pkg.outputs.TAG }}

      - uses: actions/setup-node@v4
        if: steps.check.outputs.EXISTS == 'false'
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@upstreampay'

      - name: Install dependencies
        if: steps.check.outputs.EXISTS == 'false'
        working-directory: sandpack
        run: npm install

      - name: Build
        if: steps.check.outputs.EXISTS == 'false'
        working-directory: sandpack
        run: npm run build
        env:
          VITE_PURSE_SESSION_URL: https://usp-widget-merchant.purse-sandbox.com/orchestration_session/
          VITE_PURSE_ORDER_URL: https://usp-widget-merchant.purse-sandbox.com/orchestration_order/

      - name: Publish
        if: steps.check.outputs.EXISTS == 'false'
        working-directory: sandpack
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
