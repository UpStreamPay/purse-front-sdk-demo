name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            vanilla/package-lock.json
            react/package-lock.json

      - name: Build vanilla
        working-directory: vanilla
        env:
          VITE_BASE_URL: /purse-front-sdk-demo/vanilla/
        run: npm ci && npm run build

      - name: Build react
        working-directory: react
        env:
          VITE_BASE_URL: /purse-front-sdk-demo/react/
        run: npm ci && npm run build

      - name: Assemble dist
        run: |
          mkdir -p dist/vanilla dist/react
          cp -r vanilla/dist/. dist/vanilla/
          cp -r react/dist/. dist/react/
          cp index.html dist/index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
