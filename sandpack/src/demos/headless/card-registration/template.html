<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Card Registration</title>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>
<main>
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">

    <div class="flex items-center gap-3 px-7 py-6 border-b border-gray-100">
      <svg class="w-8 h-8 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect width="24" height="24" rx="6" fill="#4f46e5"/>
        <rect x="4" y="7" width="16" height="10" rx="2" stroke="white" stroke-width="1.5"/>
        <path d="M4 11h16" stroke="white" stroke-width="1.5"/>
        <path d="M15 15l1.5 1.5L19 14" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div>
        <h1 class="text-lg font-semibold tracking-tight leading-none">Card Registration</h1>
        <p class="text-xs text-gray-400 mt-0.5">Save card for future payments via <code>register()</code></p>
      </div>
    </div>

    <!-- Skeleton -->
    <div id="skeleton" class="px-7 pt-6 pb-4 space-y-3">
      <div class="h-14 bg-gray-100 rounded-xl animate-pulse"></div>
      <div class="flex gap-3">
        <div class="h-14 bg-gray-100 rounded-xl animate-pulse flex-1"></div>
        <div class="h-14 bg-gray-100 rounded-xl animate-pulse flex-1"></div>
      </div>
      <div class="h-14 bg-gray-100 rounded-xl animate-pulse"></div>
    </div>

    <!-- Hosted form -->
    <div id="hosted-form" class="hidden px-7 pt-6 pb-2"></div>

    <!-- Save card checkbox -->
    <div class="px-7 mt-4 space-y-3">
      <label class="flex items-center gap-3 cursor-pointer select-none">
        <input id="save-card" type="checkbox"
               class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer"/>
        <span class="text-sm font-medium text-gray-700">Save this card for future payments</span>
      </label>

      <div id="name-row" class="hidden pl-7">
        <input id="card-name" type="text" placeholder="Card nickname (optional)"
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
      </div>

      <p id="reg-state" class="text-xs pl-7"></p>
    </div>

    <div class="px-7 pb-6 border-t border-gray-100 mt-5 pt-5">
      <button id="pay-btn" disabled
              class="flex items-center justify-center gap-2 w-full py-3.5 bg-indigo-600 text-white rounded-xl text-[15px] font-semibold disabled:bg-indigo-300 disabled:cursor-not-allowed">
        <span class="btn-text">Pay now</span>
        <svg class="btn-spinner w-4 h-4 animate-spin hidden" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4" stroke-dashoffset="10"/>
        </svg>
      </button>
    </div>

    <div id="result" class="hidden"></div>

  </div>
</main>
<script type="module" src="./index.ts"></script>
</body>
</html>
