<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Installment Simulation</title>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>
<main>
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">

    <div class="flex items-center gap-3 px-7 py-6 border-b border-gray-100">
      <svg class="w-8 h-8 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect width="24" height="24" rx="6" fill="#4f46e5"/>
        <path d="M6 8h12M6 12h8M6 16h5" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div>
        <h1 class="text-lg font-semibold tracking-tight leading-none">Installment Simulation</h1>
        <p class="text-xs text-gray-400 mt-0.5">Alma, Klarna, Oney, Floa, Scalapay…</p>
      </div>
    </div>

    <!-- Amount input -->
    <section class="px-7 pt-5">
      <label class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2" for="amount">
        Order amount (EUR)
      </label>
      <input id="amount" type="number" value="300" min="1" step="1"
             class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
    </section>

    <!-- Method list -->
    <section class="px-7 pt-5">
      <p class="text-xs font-semibold uppercase tracking-widest text-gray-500 mb-3">Select method</p>
      <div id="method-list"></div>
    </section>

    <!-- Simulate button -->
    <div class="px-7 pt-2 pb-4">
      <button id="simulate-btn" disabled
              class="w-full py-3 bg-indigo-600 text-white rounded-xl text-sm font-semibold disabled:bg-indigo-300 disabled:cursor-not-allowed transition-colors">
        Simulate
      </button>
    </div>

    <!-- Simulation result -->
    <div id="simulation-result" class="px-7 pb-6"></div>

  </div>
</main>
<script type="module" src="./index.ts"></script>
</body>
</html>
