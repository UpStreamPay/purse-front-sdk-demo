<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Brand Detection</title>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>
<main>
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">

    <div class="flex items-center gap-3 px-7 py-6 border-b border-gray-100">
      <svg class="w-8 h-8 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect width="24" height="24" rx="6" fill="#4f46e5"/>
        <path d="M4 9h16M4 15h10" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div>
        <h1 class="text-lg font-semibold tracking-tight leading-none">Brand Detection</h1>
        <p class="text-xs text-gray-400 mt-0.5">Co-branded cards — manual brand selection</p>
      </div>
    </div>

    <!-- Brand picker (populated reactively) -->
    <section class="px-7 pt-5">
      <p class="text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">Detected brands</p>
      <div id="brand-picker" class="flex flex-wrap gap-2 min-h-8">
        <span class="text-xs text-gray-400 italic">Start typing a card number…</span>
      </div>
    </section>

    <!-- Hosted Fields -->
    <section class="px-7 pt-5 pb-2">
      <p class="text-xs font-semibold uppercase tracking-widest text-gray-500 mb-3">Card details</p>
      <div class="space-y-3">
        <div class="field-slot" id="pan-field"></div>
        <div class="flex gap-3">
          <div class="field-slot flex-1" id="expiry-field"></div>
          <div class="field-slot flex-1" id="cvv-field"></div>
        </div>
      </div>
    </section>

    <div class="px-7 pb-6 mt-5 border-t border-gray-100 pt-5">
      <button id="pay-btn" disabled
              class="flex items-center justify-center gap-2 w-full py-3.5 bg-indigo-600 text-white rounded-xl text-[15px] font-semibold disabled:bg-indigo-300 disabled:cursor-not-allowed">
        <span class="btn-text">Pay now</span>
        <svg class="btn-spinner w-4 h-4 animate-spin hidden" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4" stroke-dashoffset="10"/>
        </svg>
      </button>
    </div>

    <div id="result" class="hidden"></div>

  </div>
</main>
<script type="module" src="./index.ts"></script>
</body>
</html>
